name: Create Draft Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build assemblies
        run: mvn -pl assemblies/assemblies-action-ilivalidator,assemblies/assemblies-transform-ilivalidator -am -DskipTests package

      - name: Create tag
        id: tag
        run: echo "tag=draft-${{ github.event.inputs.version }}-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create/Update Draft Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view ${{ steps.tag.outputs.tag }} &>/dev/null && \
            gh release delete ${{ steps.tag.outputs.tag }} --yes || true
          
          gh release create ${{ steps.tag.outputs.tag }} \
            --draft \
            --title "Draft Release ${{ github.event.inputs.version }} (Build ${{ github.run_number }})" \
            assemblies/assemblies-action-ilivalidator/target/hop-action-ilivalidator-${{ github.event.inputs.version }}-SNAPSHOT.zip \
            assemblies/assemblies-transform-ilivalidator/target/hop-transform-ilivalidator-${{ github.event.inputs.version }}-SNAPSHOT.zip
