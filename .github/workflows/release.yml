name: Release

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release ZIPs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build plugin ZIPs
        shell: bash
        run: mvn -U -B -ntp -DskipTests -pl assemblies/assemblies-action-ilivalidator,assemblies/assemblies-transform-ilivalidator -am package

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          if [[ -z "$version" ]]; then
            echo "Could not resolve project.version from Maven" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate packaged ZIPs
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.meta.outputs.version }}"
          action_dir="assemblies/assemblies-action-ilivalidator/target"
          transform_dir="assemblies/assemblies-transform-ilivalidator/target"
          action_expected="hop-action-ilivalidator-${version}.zip"
          transform_expected="hop-transform-ilivalidator-${version}.zip"

          mapfile -t action_zip_files < <(find "$action_dir" -maxdepth 1 -type f -name '*.zip' | sort)
          mapfile -t transform_zip_files < <(find "$transform_dir" -maxdepth 1 -type f -name '*.zip' | sort)

          if [[ ${#action_zip_files[@]} -ne 1 ]]; then
            echo "Expected exactly 1 ZIP in $action_dir, found ${#action_zip_files[@]}" >&2
            printf '%s\n' "${action_zip_files[@]}"
            exit 1
          fi

          if [[ ${#transform_zip_files[@]} -ne 1 ]]; then
            echo "Expected exactly 1 ZIP in $transform_dir, found ${#transform_zip_files[@]}" >&2
            printf '%s\n' "${transform_zip_files[@]}"
            exit 1
          fi

          action_zip="${action_zip_files[0]}"
          transform_zip="${transform_zip_files[0]}"
          action_name="$(basename "$action_zip")"
          transform_name="$(basename "$transform_zip")"

          if [[ "$action_name" != "$action_expected" ]]; then
            echo "Unexpected action ZIP name: expected $action_expected, found $action_name" >&2
            exit 1
          fi

          if [[ "$transform_name" != "$transform_expected" ]]; then
            echo "Unexpected transform ZIP name: expected $transform_expected, found $transform_name" >&2
            exit 1
          fi

          echo "action_zip=$action_zip" >> "$GITHUB_OUTPUT"
          echo "transform_zip=$transform_zip" >> "$GITHUB_OUTPUT"

          ls -lh "$action_zip" "$transform_zip"

      - name: Upload ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-zips
          if-no-files-found: error
          path: |
            ${{ steps.assets.outputs.action_zip }}
            ${{ steps.assets.outputs.transform_zip }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download ZIP artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-zips
          path: dist

      - name: Collect ZIP assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          mapfile -t zip_files < <(find dist -type f -name '*.zip' | sort)

          if [[ ${#zip_files[@]} -ne 2 ]]; then
            echo "Expected exactly 2 ZIP files under dist/, found ${#zip_files[@]}" >&2
            find dist -maxdepth 4 -type f -print || true
            exit 1
          fi

          cp "${zip_files[@]}" release-assets/
          ls -la release-assets

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.build.outputs.version }}"
          safe_version="${version//+/-}"
          timestamp="$(date -u +%Y%m%d-%H%M)"
          short_sha="${GITHUB_SHA::7}"
          tag="auto-v${safe_version}-${timestamp}-${short_sha}"
          name="Auto Release ${version} (${timestamp} UTC)"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-assets/*.zip
